version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agrodesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrodesk
    ports:
      - "5432:5432"
    volumes:
      - agrodesk_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agrodesk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  agrodesk_pg_data:
