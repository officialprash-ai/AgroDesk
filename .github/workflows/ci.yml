name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: typecheck, build, migrate against a real Postgres,
  # and run the test suite (with coverage) against Postgres + Redis.
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agrodesk
          POSTGRES_PASSWORD: agrodesk
          POSTGRES_DB: agrodesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agrodesk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://agrodesk:agrodesk@localhost:5432/agrodesk_test
      DIRECT_URL: postgresql://agrodesk:agrodesk@localhost:5432/agrodesk_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-at-least-32-chars-long!!
      GEMINI_API_KEY: ci-test-key
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Typecheck
        run: npm run typecheck
        working-directory: backend

      - name: Apply database migrations
        run: npx prisma migrate deploy
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Test (with coverage)
        run: npm run test:coverage
        working-directory: backend

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: ignore
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Frontend: lint, typecheck, test (with coverage), and build.
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # Report-only for now: the existing codebase has pre-existing lint
      # debt (mostly no-explicit-any). Once that is driven to zero, remove
      # `continue-on-error` to make lint a hard merge gate.
      - name: Lint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Test (with coverage)
        run: npm run test:coverage
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
          retention-days: 7

  # Aggregate gate — set THIS as the single required status check in
  # branch protection so both jobs must pass before merge.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
