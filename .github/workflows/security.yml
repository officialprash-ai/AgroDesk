name: Security

on:
  pull_request:
    paths:
      - '**/package.json'
      - '**/package-lock.json'
  push:
    branches: [main]
    paths:
      - '**/package.json'
      - '**/package-lock.json'
  # Weekly sweep so newly-disclosed advisories surface even without a code change.
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: npm audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.workspace }}

      # Blocking gate: fail the build only on CRITICAL advisories in
      # production (non-dev) dependencies — the ones that actually ship.
      - name: Audit production dependencies (critical = fail)
        run: npm audit --omit=dev --audit-level=critical
        working-directory: ${{ matrix.workspace }}

      # Informational: full report including high-severity + dev deps.
      # Does not fail the build so the pipeline stays actionable, not noisy.
      - name: Full advisory report (informational)
        run: npm audit --audit-level=high || true
        working-directory: ${{ matrix.workspace }}
