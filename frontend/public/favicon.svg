<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="48" height="48">
  <!-- Rounded tile background -->
  <rect width="120" height="120" rx="24" fill="#F4F6F8"/>

  <!-- AgroDesk tractor + rising chart mark, translated to centre in tile -->
  <g transform="translate(5, 10)">
    <!-- Rear large wheel -->
    <circle cx="38" cy="66" r="28" fill="#1C5E2D"/>
    <circle cx="38" cy="66" r="19" fill="none" stroke="white" stroke-width="1.8" stroke-opacity="0.22"/>
    <circle cx="38" cy="66" r="7"  fill="#C9A227"/>
    <circle cx="38" cy="66" r="3"  fill="#1C5E2D"/>

    <!-- Front small wheel -->
    <circle cx="84" cy="70" r="14" fill="#1C5E2D"/>
    <circle cx="84" cy="70" r="9"  fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.22"/>
    <circle cx="84" cy="70" r="4"  fill="#C9A227"/>
    <circle cx="84" cy="70" r="1.5" fill="#1C5E2D"/>

    <!-- Chassis / frame -->
    <rect x="36" y="44" width="50" height="6"  rx="3" fill="#1C5E2D"/>
    <path d="M14,48 Q14,26 38,26 Q52,26 52,48 Z" fill="#1C5E2D"/>
    <rect x="52" y="38" width="30" height="12" rx="3" fill="#1C5E2D"/>
    <rect x="53" y="22" width="6"  height="18" rx="3" fill="#1C5E2D"/>

    <!-- Cabin -->
    <rect x="28" y="16" width="26" height="22" rx="3" fill="#1C5E2D"/>
    <rect x="32" y="20" width="18" height="13" rx="2" fill="white" fill-opacity="0.2"/>

    <!-- Rising chart line (gold) -->
    <path d="M 8,80 L 28,62 L 52,50 L 74,34 L 90,18"
      stroke="#C9A227" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Arrow head -->
    <polygon points="90,18 76,22 80,30" fill="#C9A227"/>
  </g>
</svg>
